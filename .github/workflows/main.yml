name: C++ CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 CMake
        # 使用 -B 指定构建目录，-S . 指定源码目录
        run: cmake -S . -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release

      - name: 编译程序
        # 跨平台构建指令
        run: cmake --build ${{github.workspace}}/build --config Release

      - name: 运行测试
        # 修正了执行路径，并确保可执行文件具备运行权限
        # 如果你使用了 CTest，建议直接运行 ctest
        run: |
          BUILD_DIR="${{github.workspace}}/build"
          # 寻找可执行文件（防止在不同 CMake 生成器下路径不一致）
          TARGET_BIN=$(find $BUILD_DIR -name "ConcBuffer" -type f)
          
          if [ -z "$TARGET_BIN" ]; then
            echo "错误: 未找到可执行文件 ConcBuffer"
            exit 1
          fi
          
          echo "正在运行: $TARGET_BIN"
          chmod +x "$TARGET_BIN"
          "$TARGET_BIN"