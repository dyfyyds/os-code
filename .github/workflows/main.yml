name: C++ CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 CMake
        # 使用 -S . 指定当前目录为源码根目录，-B build 指定构建目录
        run: cmake -S . -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release

      - name: 编译程序
        # 跨平台构建命令
        run: cmake --build ${{github.workspace}}/build --config Release

      - name: 运行测试
        # 根据 CMakeLists.txt 中的 add_executable(OSProject ...) 运行程序
        run: |
          BUILD_DIR="${{github.workspace}}/build"
          
          # 寻找名为 OSProject 的可执行文件
          TARGET_BIN=$(find $BUILD_DIR -type f -executable -name "OSProject" | head -n 1)
          
          if [ -z "$TARGET_BIN" ]; then
            echo "错误: 未找到可执行文件 OSProject。"
            echo "当前构建目录下的文件结构如下："
            ls -R $BUILD_DIR
            exit 1
          fi
          
          echo "正在运行程序: $TARGET_BIN"
          "$TARGET_BIN"